<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      NetPro - Leading Innovation & Technology Transformation in Africa
    </title>
    <script>
      (function () {
        var themeStorageKey = 'netpro-theme-mode';
        var themeMode = 'dark';

        try {
          themeMode =
            window.localStorage.getItem(themeStorageKey) === 'light'
              ? 'light'
              : 'dark';
        } catch (error) {
          themeMode = 'dark';
        }

        document.documentElement.classList.remove('dark', 'light');
        document.documentElement.classList.add(themeMode);
        document.documentElement.style.colorScheme = themeMode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
